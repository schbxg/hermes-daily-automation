<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 360px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", Helvetica, Arial, sans-serif;
    background:
      radial-gradient(820px 360px at 12% 30%, #1c3a6e 0%, transparent 60%),
      radial-gradient(720px 380px at 88% 75%, #3a2167 0%, transparent 62%),
      linear-gradient(135deg, #0d1117 0%, #0a0d13 100%);
    position: relative; overflow: hidden;
  }
  /* subtle grid */
  body::before {
    content: ""; position: absolute; inset: 0;
    background-image:
      linear-gradient(#ffffff08 1px, transparent 1px),
      linear-gradient(90deg, #ffffff08 1px, transparent 1px);
    background-size: 46px 46px;
    mask-image: radial-gradient(700px 300px at 50% 40%, #000 0%, transparent 80%);
    -webkit-mask-image: radial-gradient(700px 300px at 50% 40%, #000 0%, transparent 80%);
  }
  .wrap {
    position: relative; z-index: 2; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 0 60px;
  }
  .logo { font-size: 64px; line-height: 1; margin-bottom: 14px;
    filter: drop-shadow(0 6px 20px rgba(106,179,243,.35)); }
  h1 {
    font-size: 52px; font-weight: 800; letter-spacing: -0.6px; color: #f0f6fc;
    margin-bottom: 12px;
  }
  h1 .grad {
    background: linear-gradient(90deg, #6ab3f3 0%, #a371f7 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .sub { font-size: 19px; color: #9aa7b4; margin-bottom: 30px; font-weight: 500; }
  .pills { display: flex; gap: 14px; }
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: #161b2299; border: 1px solid #2b3645;
    backdrop-filter: blur(4px);
    color: #c9d4df; font-size: 15px; font-weight: 600;
    padding: 10px 18px; border-radius: 999px;
  }
  .pill .e { font-size: 17px; }
  .dotline {
    position: absolute; bottom: 26px; left: 50%; transform: translateX(-50%);
    color: #5b6b7a; font-size: 13px; letter-spacing: 2px; z-index: 2;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">🤖</div>
    <h1>Hermes <span class="grad">Daily Automation</span></h1>
    <div class="sub">把任意大模型变成每天自动运转的「数字员工」· Self-running digital employees</div>
    <div class="pills">
      <div class="pill"><span class="e">⏰</span> Cron 无人值守</div>
      <div class="pill"><span class="e">🧠</span> 文件系统记忆</div>
      <div class="pill"><span class="e">🌙</span> 每晚做梦复盘</div>
      <div class="pill"><span class="e">📲</span> 推送到 Telegram</div>
    </div>
  </div>
  <div class="dotline">MIMO · DeepSeek · Claude · GPT</div>
</body>
</html>
